<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激光焊接专家数据库 | Laser Welding Expert Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a2235;
  --bg-card-hover: #1f2a40;
  --bg-surface: #0f1729;
  --border: #1e2d4a;
  --border-hover: #2a4070;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-laser: #60a5fa;
  --accent-orange: #f97316;
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --accent-purple: #8b5cf6;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --glow-blue: rgba(59, 130, 246, 0.15);
  --glow-cyan: rgba(6, 182, 212, 0.1);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.5);
  --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Noto Sans SC', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(6,182,212,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(15,23,42,0.9) 0%, transparent 100%);
  pointer-events: none; z-index: 0;
}
#root { position: relative; z-index: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }

/* Header */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(10,14,23,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 70px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-logo {
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; text-decoration: none;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 900; font-size: 18px; color: white;
  box-shadow: 0 0 20px rgba(59,130,246,0.3);
}
.logo-text {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700;
  background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.nav-links {
  display: flex; align-items: center; gap: 4px;
  list-style: none; flex-wrap: wrap;
}
.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  transition: var(--transition);
  cursor: pointer;
  white-space: nowrap;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--accent-blue);
  background: var(--glow-blue);
}
.header-right { display: flex; align-items: center; gap: 12px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: var(--transition);
  text-decoration: none; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  color: white;
  box-shadow: 0 4px 15px rgba(59,130,246,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(59,130,246,0.4);
}
.btn-secondary {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--accent-blue);
  background: var(--bg-card-hover);
}
.btn-outline {
  background: transparent;
  color: var(--accent-blue);
  border: 1px solid var(--accent-blue);
}
.btn-outline:hover {
  background: var(--accent-blue); color: white;
}
.btn-sm { padding: 6px 14px; font-size: 12px; }
.btn-lg { padding: 14px 28px; font-size: 16px; }
.btn-ghost {
  background: transparent; color: var(--text-secondary);
  border: none; padding: 8px 12px;
}
.btn-ghost:hover { color: var(--accent-blue); background: var(--glow-blue); }
.btn-orange {
  background: linear-gradient(135deg, var(--accent-orange), #ea580c);
  color: white;
  box-shadow: 0 4px 15px rgba(249,115,22,0.3);
}
.btn-orange:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(249,115,22,0.4); }
.btn-danger { background: var(--accent-red); color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-success { background: var(--accent-green); color: white; }
.btn-success:hover { background: #059669; }

/* Mobile menu */
.hamburger {
  display: none; background: none; border: none;
  color: var(--text-primary); font-size: 24px; cursor: pointer;
  padding: 8px;
}
.mobile-nav {
  display: none;
  position: fixed; top: 70px; left: 0; right: 0; bottom: 0;
  background: rgba(10,14,23,0.98);
  backdrop-filter: blur(20px);
  padding: 2rem; overflow-y: auto; z-index: 999;
}
.mobile-nav.open { display: block; }
.mobile-nav a {
  display: block; padding: 14px 0;
  color: var(--text-secondary);
  text-decoration: none; font-size: 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.mobile-nav a:hover { color: var(--accent-blue); }

/* Page container */
.page { padding-top: 70px; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
.section { padding: 5rem 0; }
.section-title {
  font-family: var(--font-display);
  font-size: 2rem; font-weight: 700;
  margin-bottom: 0.5rem;
}
.section-subtitle {
  color: var(--text-secondary);
  font-size: 1rem; margin-bottom: 2.5rem;
}
.section-header {
  text-align: center; margin-bottom: 3rem;
}

/* Hero */
.hero {
  min-height: 85vh;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
  padding: 6rem 2rem 4rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(6,182,212,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.04) 0%, transparent 60%);
  animation: heroGlow 8s ease-in-out infinite alternate;
}
@keyframes heroGlow {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}
.hero-content { position: relative; z-index: 2; max-width: 900px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  padding: 8px 20px; border-radius: 100px;
  font-size: 13px; color: var(--accent-cyan);
  margin-bottom: 2rem;
  animation: fadeInUp 0.6s ease;
}
.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  line-height: 1.2;
  margin-bottom: 1.5rem;
  background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 50%, var(--accent-blue) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: fadeInUp 0.6s ease 0.1s both;
}
.hero-slogan {
  font-size: 1.15rem;
  color: var(--text-secondary);
  max-width: 700px; margin: 0 auto 0.8rem;
  line-height: 1.8;
  animation: fadeInUp 0.6s ease 0.2s both;
}
.hero-sub {
  font-size: 0.95rem;
  color: var(--text-muted);
  max-width: 650px; margin: 0 auto 2.5rem;
  animation: fadeInUp 0.6s ease 0.3s both;
}
.hero-actions {
  display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
  animation: fadeInUp 0.6s ease 0.4s both;
}
.hero-search {
  max-width: 700px; margin: 3rem auto 0;
  animation: fadeInUp 0.6s ease 0.5s both;
}
.search-box {
  display: flex;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.search-box:focus-within {
  border-color: var(--accent-blue);
  box-shadow: 0 0 30px rgba(59,130,246,0.15);
}
.search-box input {
  flex: 1;
  background: transparent; border: none; outline: none;
  padding: 16px 24px;
  color: var(--text-primary);
  font-size: 16px; font-family: var(--font-body);
}
.search-box input::placeholder { color: var(--text-muted); }
.search-box button {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  color: white; border: none; padding: 16px 28px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: var(--font-body);
  transition: var(--transition);
}
.search-box button:hover { opacity: 0.9; }
.search-tags {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-top: 1rem; justify-content: center;
}
.search-tag {
  padding: 4px 14px;
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: 100px;
  font-size: 12px; color: var(--text-secondary);
  cursor: pointer; transition: var(--transition);
}
.search-tag:hover {
  background: rgba(59,130,246,0.15);
  color: var(--accent-blue);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1.5rem; margin: 4rem 0;
}
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem 1.5rem;
  text-align: center;
  transition: var(--transition);
}
.stat-card:hover {
  border-color: var(--accent-blue);
  transform: translateY(-4px);
  box-shadow: var(--shadow-card);
}
.stat-number {
  font-family: var(--font-display);
  font-size: 2.5rem; font-weight: 900;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.stat-label {
  color: var(--text-secondary);
  font-size: 0.9rem; margin-top: 0.5rem;
}

/* Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  transition: var(--transition);
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
  opacity: 0;
  transition: var(--transition);
}
.card:hover {
  border-color: var(--border-hover);
  transform: translateY(-4px);
  box-shadow: var(--shadow-card);
}
.card:hover::before { opacity: 1; }
.card-header {
  display: flex; align-items: flex-start; gap: 1rem;
  margin-bottom: 1rem;
}
.card-avatar {
  width: 56px; height: 56px; border-radius: 12px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
}
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 1.1rem; font-weight: 700; margin-bottom: 2px; }
.card-role { font-size: 0.85rem; color: var(--text-secondary); }
.card-org { font-size: 0.8rem; color: var(--text-muted); }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 0.75rem 0; }
.tag {
  padding: 3px 10px; border-radius: 100px;
  font-size: 11px; font-weight: 500;
  background: rgba(59,130,246,0.1); color: var(--accent-blue);
  border: 1px solid rgba(59,130,246,0.15);
}
.tag-green { background: rgba(16,185,129,0.1); color: var(--accent-green); border-color: rgba(16,185,129,0.15); }
.tag-orange { background: rgba(249,115,22,0.1); color: var(--accent-orange); border-color: rgba(249,115,22,0.15); }
.tag-purple { background: rgba(139,92,246,0.1); color: var(--accent-purple); border-color: rgba(139,92,246,0.15); }
.tag-red { background: rgba(239,68,68,0.1); color: var(--accent-red); border-color: rgba(239,68,68,0.15); }
.tag-cyan { background: rgba(6,182,212,0.1); color: var(--accent-cyan); border-color: rgba(6,182,212,0.15); }
.card-meta {
  display: flex; align-items: center; gap: 1rem;
  font-size: 0.8rem; color: var(--text-muted);
  margin-top: 0.75rem; flex-wrap: wrap;
}
.card-actions {
  display: flex; gap: 8px; margin-top: 1rem;
  padding-top: 1rem; border-top: 1px solid var(--border);
}

/* Detail pages */
.detail-page { padding: 2rem 0; }
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  color: var(--accent-blue); text-decoration: none;
  font-size: 14px; cursor: pointer;
  margin-bottom: 2rem;
  transition: var(--transition);
}
.back-link:hover { color: var(--accent-cyan); }
.detail-header {
  display: flex; gap: 2rem; align-items: flex-start;
  margin-bottom: 3rem; flex-wrap: wrap;
}
.detail-avatar {
  width: 120px; height: 120px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; flex-shrink: 0;
}
.detail-info { flex: 1; min-width: 300px; }
.detail-name { font-size: 2rem; font-weight: 900; margin-bottom: 0.5rem; }
.detail-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem; margin-bottom: 1.5rem;
}
.detail-section h3 {
  font-size: 1.1rem; font-weight: 700;
  margin-bottom: 1rem; padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.detail-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 1rem;
}
.detail-field label {
  display: block; font-size: 0.8rem; color: var(--text-muted);
  margin-bottom: 4px; font-weight: 500;
}
.detail-field span {
  font-size: 0.95rem; color: var(--text-primary);
}

/* Sidebar layout */
.page-with-sidebar {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 2rem;
  align-items: flex-start;
}
.sidebar {
  position: sticky; top: 90px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
}
.sidebar h3 {
  font-size: 0.95rem; font-weight: 700;
  margin-bottom: 1rem; color: var(--text-primary);
}
.filter-group { margin-bottom: 1.5rem; }
.filter-group label {
  display: block; font-size: 0.8rem;
  color: var(--text-muted); margin-bottom: 6px;
  font-weight: 500;
}
.filter-group select, .filter-group input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: var(--transition);
}
.filter-group select:focus, .filter-group input:focus {
  border-color: var(--accent-blue);
}
.filter-group select option { background: var(--bg-secondary); }

/* Table */
.data-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.data-table th {
  background: var(--bg-surface);
  padding: 14px 16px;
  text-align: left;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
}
.data-table td {
  padding: 14px 16px;
  font-size: 0.9rem;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}
.data-table tr:hover td { background: var(--bg-card-hover); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 2000;
  display: flex; align-items: center; justify-content: center;
  padding: 2rem;
  animation: fadeIn 0.2s ease;
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  max-width: 600px; width: 100%;
  max-height: 90vh; overflow-y: auto;
  padding: 2rem;
  animation: slideUp 0.3s ease;
}
.modal-lg { max-width: 800px; }
.modal h2 {
  font-size: 1.3rem; margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 10px;
}
.modal-close {
  position: absolute; top: 1rem; right: 1rem;
  background: none; border: none;
  color: var(--text-muted); font-size: 24px;
  cursor: pointer;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Form */
.form-group { margin-bottom: 1.25rem; }
.form-group label {
  display: block; font-size: 0.85rem;
  color: var(--text-secondary); margin-bottom: 6px;
  font-weight: 500;
}
.form-group label .required { color: var(--accent-red); }
.form-input {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: var(--transition);
}
.form-input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
textarea.form-input { min-height: 100px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* Toast */
.toast-container {
  position: fixed; top: 90px; right: 20px;
  z-index: 3000; display: flex; flex-direction: column; gap: 10px;
}
.toast {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 20px;
  min-width: 300px;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease;
  display: flex; align-items: center; gap: 10px;
}
.toast-success { border-left: 4px solid var(--accent-green); }
.toast-error { border-left: 4px solid var(--accent-red); }
.toast-info { border-left: 4px solid var(--accent-blue); }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(100px); }
  to { opacity: 1; transform: translateX(0); }
}

/* Footer */
.footer {
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  padding: 4rem 0 2rem;
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
  gap: 2rem; margin-bottom: 3rem;
}
.footer-brand p {
  color: var(--text-secondary);
  font-size: 0.9rem; margin: 1rem 0;
  line-height: 1.8;
}
.footer h4 {
  font-size: 0.9rem; font-weight: 700;
  margin-bottom: 1rem; color: var(--text-primary);
}
.footer a {
  display: block; color: var(--text-muted);
  text-decoration: none; font-size: 0.85rem;
  padding: 4px 0; transition: var(--transition);
  cursor: pointer;
}
.footer a:hover { color: var(--accent-blue); }
.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 2rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
}
.safety-notice {
  background: rgba(249,115,22,0.08);

// ========== TOAST SYSTEM ==========
const ToastContext = createContext();
function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((msg, type = 'success') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="toast-container">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>
            <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✗' : 'ℹ'}</span>
            <span>{t.msg}</span>
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}
const useToast = () => useContext(ToastContext);

// ========== ROUTER ==========
const RouterContext = createContext();
function useRouter() { return useContext(RouterContext); }
function Router({ children }) {
  const [path, setPath] = useState(window.location.hash.slice(1) || '/');
  useEffect(() => {
    const handler = () => setPath(window.location.hash.slice(1) || '/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  const navigate = useCallback((p) => {
    window.location.hash = p;
    window.scrollTo(0, 0);
  }, []);
  return <RouterContext.Provider value={{ path, navigate }}>{children}</RouterContext.Provider>;
}
function Link({ to, children, className, onClick }) {

  return <a className={className} onClick={(e) => { e.preventDefault(); navigate(to); onClick && onClick(); }}

}

// ========== LOCAL STORAGE ==========
function useLocalStorage(key, initial) {
  const [data, setData] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : initial;
    } catch { return initial; }
  });
  useEffect(() => {
    localStorage.setItem(key, JSON.stringify(data));
  }, [key, data]);
  return [data, setData];
}

function EquipmentPage() {
  const { navigate } = useRouter();
  const [search, setSearch] = useState('');
  const [matFilter, setMatFilter] = useState('');
  const [compareList, setCompareList] = useLocalStorage('compare_list', []);
  const filtered = useMemo(() => EQUIPMENT_PARAMS.filter(e => {
    if (search && !e.material.includes(search) && !e.scene.includes(search)) return false;
    if (matFilter && !e.material.includes(matFilter)) return false;
    return true;
  }), [search, matFilter]);
  const toggleCompare = (item) => {
    setCompareList(prev => {
      const exists = prev.find(x => x.id === item.id);
      if (exists) return prev.filter(x => x.id !== item.id);
      if (prev.length >= 3) return prev;
      return [...prev, item];
    });
  };
  return (
    <div className="page">
      <div className="page-header"><div className="container"><h1>设备与参数</h1><p>激光焊接工艺参数查询与对比工具</p></div></div>
      <div className="container" style={{ paddingBottom: '3rem' }}>
        <div className="page-with-sidebar">
          <div className="sidebar">
            <h3>筛选</h3>
            <div className="filter-group"><label>搜索</label><input placeholder="材料/场景" value={search} onChange={e => setSearch(e.target.value)} /></div>
            <div className="filter-group"><label>材料</label><select value={matFilter} onChange={e => setMatFilter(e.target.value)}><option value="">全部</option>{[...new Set(EQUIPMENT_PARAMS.map(e=>e.material))].map(m=><option key={m} value={m}>{m}</option>)}</select></div>
            <button className="btn btn-sm btn-secondary" style={{width:'100%'}} onClick={() => { setSearch(''); setMatFilter(''); }}>重置</button>
          </div>
          <div>
            <p style={{ color: 'var(--text-muted)', marginBottom: '1rem' }}>共 {filtered.length} 条参数记录</p>
            <div style={{ overflowX: 'auto' }}>
              <table className="data-table">
                <thead><tr><th>材料</th><th>厚度</th><th>焊接方式</th><th>激光功率</th><th>焊接速度</th><th>应用场景</th><th>操作</th></tr></thead>
                <tbody>
                  {filtered.map(e => (
                    <tr key={e.id}>
                      <td style={{ fontWeight: 600, color: 'var(--text-primary)' }}>{e.material}</td>
                      <td>{e.thickness}</td><td>{e.method}</td><td>{e.laserPower}</td><td>{e.speed}</td>
                      <td><span className="tag tag-cyan">{e.scene}</span></td>
                      <td>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button className="btn btn-sm btn-primary" onClick={() => navigate('/equipment/' + e.id)}>详情</button>
                          <button className={`btn btn-sm ${compareList.find(x=>x.id===e.id) ? 'btn-success' : 'btn-secondary'}`}
                            onClick={() => toggleCompare(e)}>
                            {compareList.find(x=>x.id===e.id) ? '已选' : '对比'}
                          </button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      {compareList.length > 0 && (
        <div className="compare-bar">
          <div className="compare-items">
            <span style={{ color: 'var(--text-secondary)', marginRight: 8 }}>对比栏({compareList.length}/3)：</span>
            {compareList.map(item => (
              <div key={item.id} className="compare-item">
                <span>{item.material} {item.thickness}</span>
                <button onClick={() => setCompareList(prev => prev.filter(x => x.id !== item.id))}>×</button>
              </div>
            ))}
          </div>
          <button className="btn btn-sm btn-danger" onClick={() => setCompareList([])}>清空对比</button>
        </div>
      )}
    </div>
  );
}

function SearchPage({ query }) {
  const { navigate } = useRouter();
  const q = decodeURIComponent(query || '');
  const [tab, setTab] = useState('all');
  const results = useMemo(() => {
    const check = (s) => s && s.toLowerCase().includes(q.toLowerCase());
    return {
      experts: EXPERTS.filter(e => check(e.name) || check(e.direction) || e.materials.some(m => check(m)) || e.industries.some(i => check(i))),
      articles: ARTICLES.filter(a => check(a.title) || a.tags.some(t => check(t)) || a.materials.some(m => check(m))),
      materials: MATERIALS.filter(m => check(m.name) || check(m.category) || check(m.grades)),
      defects: DEFECTS.filter(d => check(d.name) || d.materials.some(m => check(m))),
      cases: CASES.filter(c => check(c.title) || check(c.material) || check(c.industry)),
      equipment: EQUIPMENT_PARAMS.filter(e => check(e.material) || check(e.scene) || check(e.device)),
      downloads: DOWNLOADS.filter(d => check(d.name) || check(d.type))
    };
  }, [q]);
  const totalResults = Object.values(results).reduce((s, arr) => s + arr.length, 0);
  const tabs = [
    ['all', `全部(${totalResults})`], ['experts', `专家(${results.experts.length})`], ['articles', `文章(${results.articles.length})`],
    ['materials', `材料(${results.materials.length})`], ['defects', `缺陷(${results.defects.length})`], ['cases', `案例(${results.cases.length})`],
    ['equipment', `参数(${results.equipment.length})`], ['downloads', `资料(${results.downloads.length})`]
  ];
  const show = (type) => tab === 'all' || tab === type;
  return (
    <div className="page">
      <div className="page-header"><div className="container"><h1>搜索结果</h1><p>关键词："{q}" — 共 {totalResults} 条结果</p></div></div>
      <div className="container" style={{ paddingBottom: '3rem' }}>
        <div className="tabs">{tabs.map(([k, l]) => <button key={k} className={`tab ${tab===k?'active':''}`} onClick={() => setTab(k)}>{l}</button>)}</div>
        {totalResults === 0 ? (
          <div className="empty-state">
            <div className="icon">🔍</div>
            <h3>未找到相关内容</h3>
            <p>您可以提交技术咨询，由平台专家协助分析。</p>
            <button className="btn btn-orange" style={{ marginTop: 16 }} onClick={() => navigate('/consultation')}>📝 提交技术咨询</button>
          </div>
        ) : (
          <>
            {show('experts') && results.experts.length > 0 && (
              <div className="search-results-group">
                <h3>👨‍🔬 专家 <span className="result-count">{results.experts.length}</span></h3>
                {results.experts.map(e => (
                  <div key={e.id} className="search-result-item" onClick={() => navigate('/experts/' + e.id)}>
                    <h4>{e.name} — {e.title}</h4>
                    <p>{e.org} · {e.direction} · {e.materials.join('、')}</p>
                  </div>
                ))}
              </div>
            )}
            {show('articles') && results.articles.length > 0 && (
              <div className="search-results-group">
                <h3>📄 工艺文章 <span className="result-count">{results.articles.length}</span></h3>
                {results.articles.map(a => (
                  <div key={a.id} className="search-result-item" onClick={() => navigate('/articles/' + a.id)}>
                    <h4>{a.title}</h4>
                    <p>{a.category} · {a.difficulty} · {a.materials.join('、')}</p>
                  </div>
                ))}
              </div>
            )}
            {show('materials') && results.materials.length > 0 && (
              <div className="search-results-group">
                <h3>🔩 材料数据 <span className="result-count">{results.materials.length}</span></h3>
                {results.materials.map(m => (
                  <div key={m.id} className="search-result-item" onClick={() => navigate('/materials/' + m.id)}>
                    <h4>{m.name}</h4>
                    <p>{m.category} · {m.grades} · 难度：{m.difficulty}</p>
                  </div>
                ))}
              </div>
            )}
            {show('defects') && results.defects.length > 0 && (
              <div className="search-results-group">
                <h3>⚠️ 缺陷分析 <span className="result-count">{results.defects.length}</span></h3>
                {results.defects.map(d => (
                  <div key={d.id} className="search-result-item" onClick={() => navigate('/defects/' + d.id)}>
                    <h4>{d.name}</h4>
                    <p>风险等级：{d.risk} · {d.materials.join('、')}</p>

  const [deleteConfirm, setDeleteConfirm] = useState(null);

  useEffect(() => {
    if (!localStorage.getItem('admin_logged')) { navigate('/admin/login'); }
  }, []);

  const menus = [
    ['dashboard', '📊 仪表盘'], ['experts', '👨‍🔬 专家管理'], ['articles', '📄 文章管理'],
    ['materials', '🔩 材料管理'], ['equipment', '⚙️ 参数管理'], ['defects', '⚠️ 缺陷管理'],
    ['cases', '🏭 案例管理'], ['downloads', '📥 资料管理'], ['messages', '💬 咨询留言'], ['members', '👥 会员管理'], ['settings', '⚙️ 系统设置']
  ];
  const currentSection = section || 'dashboard';

  const stats = [
    { label: '专家数量', value: EXPERTS.length, icon: '👨‍🔬' },
    { label: '文章数量', value: ARTICLES.length, icon: '📄' },
    { label: '材料数量', value: MATERIALS.length, icon: '🔩' },
    { label: '案例数量', value: CASES.length, icon: '🏭' },
    { label: '参数记录', value: EQUIPMENT_PARAMS.length, icon: '⚙️' },
    { label: '缺陷条目', value: DEFECTS.length, icon: '⚠️' },
    { label: '资料数量', value: DOWNLOADS.length, icon: '📥' },
    { label: '咨询留言', value: MESSAGES_INIT.length, icon: '💬' }
  ];

  const fieldConfigs = {
    experts: { title: '专家管理', fields: ['name', 'org', 'direction', 'region'], labels: ['姓名', '单位', '专业方向', '地区'] },
    articles: { title: '文章管理', fields: ['title', 'category', 'difficulty', 'views'], labels: ['标题', '分类', '难度', '阅读量'] },
    materials: { title: '材料管理', fields: ['name', 'category', 'difficulty'], labels: ['名称', '类别', '难度'] },
    equipment: { title: '参数管理', fields: ['material', 'thickness', 'method'], labels: ['材料', '厚度', '焊接方式'] },
    defects: { title: '缺陷管理', fields: ['name', 'risk'], labels: ['名称', '风险等级'] },
    cases: { title: '案例管理', fields: ['title', 'industry', 'material'], labels: ['标题', '行业', '材料'] },
    downloads: { title: '资料管理', fields: ['name', 'type', 'level'], labels: ['名称', '类型', '等级'] },
    messages: { title: '咨询留言', fields: ['name', 'company', 'problem', 'status', 'date'], labels: ['姓名', '公司', '问题', '状态', '日期'] },
    members: { title: '会员管理', fields: ['name', 'level', 'date'], labels: ['用户名', '等级', '开通日期'] }
  };

  const currentDataKey = currentSection === 'dashboard' || currentSection === 'settings' ? null : currentSection;
  const config = currentDataKey ? fieldConfigs[currentDataKey] : null;
  const currentData = currentDataKey ? (adminData[currentDataKey] || []) : [];

  const filteredData = useMemo(() => {
    if (!search || !currentDataKey) return currentData;
    return currentData.filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(search.toLowerCase())));
  }, [currentData, search, currentDataKey]);

  const handleAdd = () => { setEditItem({}); setShowModal(true); };
  const handleEdit = (item) => { setEditItem({ ...item }); setShowModal(true); };
  const handleSave = () => {
    if (!editItem) return;
    setAdminData(prev => {
      const arr = [...(prev[currentDataKey] || [])];
      if (editItem.id) {
        const idx = arr.findIndex(x => x.id === editItem.id);
        if (idx >= 0) arr[idx] = editItem;
      } else {
        editItem.id = Date.now();
        arr.push(editItem);
      }
      return { ...prev, [currentDataKey]: arr };
    });
    setShowModal(false);
    setEditItem(null);
    toast('操作成功！', 'success');
  };
  const handleDelete = (id) => {
    setAdminData(prev => ({
      ...prev,
      [currentDataKey]: prev[currentDataKey].filter(x => x.id !== id)
    }));
    setDeleteConfirm(null);
    toast('删除成功！', 'success');
  };

  const handleLogout = () => {
    localStorage.removeItem('admin_logged');
    toast('已退出登录', 'info');
    navigate('/admin/login');
  };

  return (
    <div className="page">
      <div className="admin-layout">
        <div className="admin-sidebar">
          {menus.map(([k, l]) => (
            <a key={k} className={currentSection === k ? 'active' : ''} onClick={() => navigate('/admin/' + k)}>{l}</a>
          ))}
          <a onClick={handleLogout} style={{ marginTop: 'auto', color: 'var(--accent-red)' }}>🚪 退出登录</a>
        </div>
        <div className="admin-content">
          {currentSection === 'dashboard' ? (
            <>
              <div className="admin-header"><h1>仪表盘</h1></div>
              <div className="admin-stats">
                {stats.map(s => (
                  <div key={s.label} className="admin-stat">
                    <div style={{ fontSize: '1.5rem', marginBottom: 8 }}>{s.icon}</div>
                    <div className="number">{s.value}</div>
                    <div className="label">{s.label}</div>
                  </div>
                ))}
              </div>
              <div className="detail-section">
                <h3>📊 平台概览</h3>
                <p style={{ color: 'var(--text-secondary)', lineHeight: 1.8 }}>
                  欢迎使用激光焊接专家数据库后台管理系统。平台已收录 {EXPERTS.length} 位专家、{ARTICLES.length} 篇工艺文章、
                  {MATERIALS.length} 种材料数据、{CASES.length} 个行业案例、{EQUIPMENT_PARAMS.length} 条设备参数和 {DEFECTS.length} 种缺陷分析。
                </p>
              </div>
            </>
          ) : currentSection === 'settings' ? (
            <>
              <div className="admin-header"><h1>系统设置</h1></div>
              <div className="detail-section">
                <h3>⚙️ 基本设置</h3>
                <div className="form-group"><label>平台名称</label><input className="form-input" defaultValue="激光焊接专家数据库" /></div>
                <div className="form-group"><label>服务热线</label><input className="form-input" defaultValue="400-XXX-XXXX" /></div>
                <div className="form-group"><label>邮箱</label><input className="form-input" defaultValue="service@laser-welding-db.com" /></div>
                <button className="btn btn-primary" onClick={() => toast('设置已保存', 'success')}>保存设置</button>
              </div>
            </>
          ) : config ? (
            <>
              <div className="admin-header"><h1>{config.title}</h1><button className="btn btn-primary" onClick={handleAdd}>+ 新增</button></div>
              <div className="admin-toolbar">
                <input placeholder="搜索…" value={search} onChange={e => setSearch(e.target.value)} />
              </div>
              <div style={{ overflowX: 'auto' }}>
                <table className="data-table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      {config.labels.map(l => <th key={l}>{l}</th>)}
                      <th>操作</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredData.map(item => (
                      <tr key={item.id}>
                        <td>{item.id}</td>
                        {config.fields.map(f => <td key={f}>{String(item[f] || '-')}</td>)}
                        <td>
                          <div style={{ display: 'flex', gap: 4 }}>
                            <button className="btn btn-sm btn-primary" onClick={() => handleEdit(item)}>编辑</button>
                            <button className="btn btn-sm btn-danger" onClick={() => setDeleteConfirm(item.id)}>删除</button>
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {filteredData.length === 0 && <div className="empty-state" style={{ padding: '2rem' }}><p>暂无数据</p></div>}
            </>
          ) : null}
        </div>
      </div>

      {showModal && editItem && config && (
        <div className="modal-overlay" onClick={() => setShowModal(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <h2>{editItem.id ? '编辑' : '新增'}{config.title.replace('管理', '')}</h2>
            {config.fields.map((f, i) => (
              <div className="form-group" key={f}>
                <label>{config.labels[i]}</label>
                <input className="form-input" value={editItem[f] || ''} onChange={e => setEditItem({...editItem, [f]: e.target.value})} />
              </div>
            ))}
            <div style={{ display: 'flex', gap: 12, marginTop: 16 }}>
              <button className="btn btn-primary" onClick={handleSave}>保存</button>
              <button className="btn btn-secondary" onClick={() => setShowModal(false)}>取消</button>
            </div>
          </div>
        </div>
      )}

      {deleteConfirm && (
        <div className="modal-overlay" onClick={() => setDeleteConfirm(null)}>
          <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 400 }}>
            <h2>确认删除</h2>
            <p style={{ color: 'var(--text-secondary)', marginBottom: '1.5rem' }}>确定要删除此条目吗？此操作不可恢复。</p>
            <div style={{ display: 'flex', gap: 12 }}>
              <button className="btn btn-danger" onClick={() => handleDelete(deleteConfirm)}>确认删除</button>
              <button className="btn btn-secondary" onClick={() => setDeleteConfirm(null)}>取消</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ========== FLOATING BUTTON ==========
function FloatingConsult() {
  const { navigate, path } = useRouter();
  if (path.startsWith('/admin') || path === '/consultation') return null;
  return (
    <button className="fab-consult" onClick={() => navigate('/consultation')} title="技术咨询">
      💬
    </button>
  );
}

// ========== APP ==========
function App() {
  const { path } = useRouter();
  const isAdmin = path.startsWith('/admin') && path !== '/admin/login';

  const renderPage = () => {
    if (path === '/' || path === '') return <HomePage />;
    if (path === '/experts') return <ExpertListPage />;
    if (path.startsWith('/experts/')) return <ExpertDetailPage id={path.split('/')[2]} />;
    if (path === '/articles') return <ArticlesPage />;
    if (path.startsWith('/articles/')) return <ArticleDetailPage id={path.split('/')[2]} />;
    if (path === '/materials') return <MaterialsPage />;
    if (path.startsWith('/materials/')) return <MaterialDetailPage id={path.split('/')[2]} />;
    if (path === '/equipment') return <EquipmentPage />;
    if (path.startsWith('/equipment/')) return <EquipmentDetailPage id={path.split('/')[2]} />;
    if (path === '/defects') return <DefectsPage />;
    if (path.startsWith('/defects/')) return <DefectDetailPage id={path.split('/')[2]} />;
    if (path === '/cases') return <CasesPage />;
    if (path.startsWith('/cases/')) return <CaseDetailPage id={path.split('/')[2]} />;
    if (path === '/downloads') return <DownloadsPage />;
    if (path === '/membership') return <MembershipPage />;
    if (path === '/consultation') return <ConsultationPage />;
    if (path === '/expert-apply') return <ExpertApplyPage />;
    if (path === '/about') return <AboutPage />;
    if (path === '/admin/login') return <AdminLoginPage />;
    if (path.startsWith('/admin/')) return <AdminDashboard section={path.split('/')[2]} />;
    if (path.startsWith('/search')) {
      const params = new URLSearchParams(window.location.hash.split('?')[1]);
      return <SearchPage query={params.get('q')} />;
    }
    return <HomePage />;
  };

  return (
    <>
      <Header />
      {renderPage()}
      {!isAdmin && <FloatingConsult />}
      {!isAdmin && <Footer />}
    </>
  );
}

function Root() {
  return (
    <Router>
      <ToastProvider>
        <App />
      </ToastProvider>
    </Router>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
